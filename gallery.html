<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title>Jiracet | Gallery</title>
    <meta name="description" content="Hi, I'm Joseph Suh.
    I like to experiment with 'black sheep' game genres and try to craft new and interesting experiences.">

    <link type="text/css" rel="stylesheet" href="css/main.css">
    <link type="text/css" rel="stylesheet" href="css/gallery.css">
    <link href="css/lightbox.css" rel="stylesheet" />
    <link rel="icon" type="image/ico" href="favicon.ico">

    <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>

<body ng-app="app">
<header>
    <div class="banner"><img src="images/home/avatar.png"></div>

    <h1>Jiracet</h1>

    <div id="nav-bar">
        <a href="http://jiracet.com">Home</a>
        <a>|</a>
        <a href="http://jiracet.com/gallery">Gallery</a>
    </div>
</header>

<!-- Content -->
<div id="main">
    <div id="main-content">

        <div class="row" style="padding-bottom:0">
            <h3>Chroma Development Screenshots</h3>
        </div>
        <table class="gallery-container" ng-controller="GalleryController"
             ng-init="init('chroma', 16)">

            <td class="gallery-img" ng-repeat="image in images">
                <a href="{{image}}" data-lightbox="chroma"><img ng-src="{{image}}"></a>
            </td>
        </table>
    </div>


    <div class="stripe"></div>
</div>

<!-- Footer -->
<footer>
    <div class="top">
        <a href="#">To top</a>
    </div>

    <div class="bottom">
        All Rights Reserved.
    </div>
</footer>

<!-- Javascript -->
<script src="js/jquery-2.1.1.min.js"></script>
<script src="js/jquery.color-2.1.2.min.js"></script>

<script src="js/jquery-1.11.0.min.js"></script>
<script src="js/lightbox.min.js"></script>

<script src="js/app.js"></script>

<script src="js/angular.min.js"></script>
<script src="js/controllers/gallerycontroller.js"></script>

</body>
</html>
